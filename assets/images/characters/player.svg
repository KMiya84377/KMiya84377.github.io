<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- プレイヤーの体 -->
  <g id="player">
    <!-- 頭 -->
    <circle cx="50" cy="30" r="15" fill="#ffcc99" stroke="#996633" stroke-width="1"/>
    
    <!-- 顔 -->
    <circle cx="45" cy="27" r="2" fill="#000"/>
    <circle cx="55" cy="27" r="2" fill="#000"/>
    <path d="M45 37 Q 50 40 55 37" fill="none" stroke="#000" stroke-width="1"/>
    
    <!-- 体 -->
    <path d="M50 45 L50 85" stroke="#333366" stroke-width="10" stroke-linecap="round"/>
    
    <!-- 腕 -->
    <path d="M50 55 L30 65" stroke="#333366" stroke-width="5" stroke-linecap="round"/>
    <path d="M50 55 L70 65" stroke="#333366" stroke-width="5" stroke-linecap="round"/>
    
    <!-- 足 -->
    <path d="M50 85 L40 95" stroke="#333366" stroke-width="5" stroke-linecap="round"/>
    <path d="M50 85 L60 95" stroke="#333366" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>