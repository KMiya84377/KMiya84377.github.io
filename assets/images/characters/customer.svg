<svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90">
  <!-- カスタマータイプの敵 -->
  <g id="customer">
    <!-- 頭 -->
    <circle cx="45" cy="25" r="12" fill="#6495ED" stroke="#4169E1" stroke-width="1"/>
    
    <!-- 顔 -->
    <circle cx="40" cy="22" r="2" fill="#000"/>
    <circle cx="50" cy="22" r="2" fill="#000"/>
    <path d="M40 32 Q 45 28 50 32" fill="none" stroke="#000" stroke-width="1"/>
    
    <!-- 体 -->
    <rect x="35" y="37" width="20" height="30" rx="5" ry="5" fill="#6495ED" stroke="#4169E1" stroke-width="1"/>
    
    <!-- 腕 -->
    <path d="M35 45 L20 55" stroke="#6495ED" stroke-width="4" stroke-linecap="round"/>
    <path d="M55 45 L70 55" stroke="#6495ED" stroke-width="4" stroke-linecap="round"/>
    
    <!-- 足 -->
    <path d="M40 67 L35 85" stroke="#6495ED" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 67 L55 85" stroke="#6495ED" stroke-width="4" stroke-linecap="round"/>
    
    <!-- ビジネスバッグ -->
    <rect x="15" y="53" width="10" height="15" rx="2" ry="2" fill="#333" stroke="#000" stroke-width="1"/>
  </g>
</svg>