<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- ボスキャラクター -->
  <g id="boss">
    <!-- 頭 -->
    <circle cx="60" cy="30" r="18" fill="#990000" stroke="#660000" stroke-width="2"/>
    
    <!-- 顔 -->
    <circle cx="53" cy="25" r="3" fill="#ffff00"/>
    <circle cx="67" cy="25" r="3" fill="#ffff00"/>
    <path d="M50 40 Q 60 45 70 40" fill="none" stroke="#ff0000" stroke-width="2"/>
    
    <!-- 角 -->
    <path d="M50 20 L40 5" stroke="#660000" stroke-width="4" stroke-linecap="round"/>
    <path d="M70 20 L80 5" stroke="#660000" stroke-width="4" stroke-linecap="round"/>
    
    <!-- 体 -->
    <path d="M60 48 L60 100" stroke="#660000" stroke-width="14" stroke-linecap="round"/>
    
    <!-- 腕 -->
    <path d="M60 60 L30 75" stroke="#660000" stroke-width="8" stroke-linecap="round"/>
    <path d="M60 60 L90 75" stroke="#660000" stroke-width="8" stroke-linecap="round"/>
    
    <!-- 足 -->
    <path d="M60 100 L45 115" stroke="#660000" stroke-width="8" stroke-linecap="round"/>
    <path d="M60 100 L75 115" stroke="#660000" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>