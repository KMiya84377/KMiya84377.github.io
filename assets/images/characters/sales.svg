<svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90">
  <!-- セールスタイプの敵 -->
  <g id="sales">
    <!-- 頭 -->
    <circle cx="45" cy="25" r="12" fill="#32CD32" stroke="#228B22" stroke-width="1"/>
    
    <!-- 顔 -->
    <circle cx="40" cy="22" r="2" fill="#000"/>
    <circle cx="50" cy="22" r="2" fill="#000"/>
    <path d="M40 30 Q 45 35 50 30" fill="none" stroke="#000" stroke-width="1"/>
    
    <!-- ネクタイ -->
    <path d="M45 37 L42 55 L45 60 L48 55 L45 37" fill="#FF0000" stroke="#8B0000" stroke-width="1"/>
    
    <!-- 体 -->
    <rect x="35" y="37" width="20" height="30" rx="5" ry="5" fill="#32CD32" stroke="#228B22" stroke-width="1"/>
    
    <!-- 腕 -->
    <path d="M35 42 L20 35" stroke="#32CD32" stroke-width="4" stroke-linecap="round"/>
    <path d="M55 42 L70 35" stroke="#32CD32" stroke-width="4" stroke-linecap="round"/>
    
    <!-- 足 -->
    <path d="M40 67 L35 85" stroke="#32CD32" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 67 L55 85" stroke="#32CD32" stroke-width="4" stroke-linecap="round"/>
    
    <!-- グラフ/チャート -->
    <rect x="65" y="25" width="10" height="15" fill="#FFFFFF" stroke="#000" stroke-width="1"/>
    <path d="M65 35 L75 25" stroke="#FF0000" stroke-width="1"/>
  </g>
</svg>