<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景色 -->
  <rect width="256" height="256" fill="#708090" />
  
  <!-- 金属の縦方向の筋 -->
  <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#607080;stop-opacity:1" />
    <stop offset="10%" style="stop-color:#889aaa;stop-opacity:1" />
    <stop offset="20%" style="stop-color:#607080;stop-opacity:1" />
    <stop offset="30%" style="stop-color:#889aaa;stop-opacity:1" />
    <stop offset="40%" style="stop-color:#607080;stop-opacity:1" />
    <stop offset="50%" style="stop-color:#889aaa;stop-opacity:1" />
    <stop offset="60%" style="stop-color:#607080;stop-opacity:1" />
    <stop offset="70%" style="stop-color:#889aaa;stop-opacity:1" />
    <stop offset="80%" style="stop-color:#607080;stop-opacity:1" />
    <stop offset="90%" style="stop-color:#889aaa;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#607080;stop-opacity:1" />
  </linearGradient>
  <rect width="256" height="256" fill="url(#metalGradient)" />
  
  <!-- 金属の質感 - 横方向の薄い筋 -->
  <pattern id="metalPattern" width="256" height="16" patternUnits="userSpaceOnUse">
    <rect width="256" height="1" y="4" fill="#607080" opacity="0.2" />
    <rect width="256" height="1" y="12" fill="#607080" opacity="0.2" />
  </pattern>
  <rect width="256" height="256" fill="url(#metalPattern)" />
  
  <!-- 鏡面の光沢 - 左上から右下への斜めのハイライト -->
  <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
    <stop offset="45%" style="stop-color:#ffffff;stop-opacity:0" />
    <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.3" />
    <stop offset="55%" style="stop-color:#ffffff;stop-opacity:0" />
    <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
  </linearGradient>
  <rect width="256" height="256" fill="url(#highlight)" />
</svg>