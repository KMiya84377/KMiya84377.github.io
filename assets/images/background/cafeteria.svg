<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景色 -->
  <rect width="1920" height="1080" fill="#f8f8ec" />
  
  <!-- 床のパターン (タイル床) -->
  <pattern id="floorPattern" width="60" height="60" patternUnits="userSpaceOnUse">
    <rect width="60" height="60" fill="#e6e6d9" stroke="#d0d0c0" stroke-width="1" />
    <rect x="30" y="0" width="30" height="30" fill="#ededdf" />
    <rect x="0" y="30" width="30" height="30" fill="#ededdf" />
  </pattern>
  <rect width="1920" height="300" y="780" fill="url(#floorPattern)" />
  
  <!-- 壁のデザイン -->
  <rect width="1920" height="780" fill="#fcfcf5" />
  <line x1="0" y1="780" x2="1920" y2="780" stroke="#e0e0d0" stroke-width="3" />
  
  <!-- アクセントウォール -->
  <rect x="0" y="0" width="300" height="780" fill="#508a7f" />
  <rect x="1620" y="0" width="300" height="780" fill="#508a7f" />
  
  <!-- 窓 -->
  <rect x="400" y="100" width="400" height="350" fill="#e6f7ff" />
  <rect x="900" y="100" width="400" height="350" fill="#e6f7ff" />
  
  <!-- 窓枠 -->
  <rect x="400" y="100" width="400" height="350" stroke="#d0d0c0" stroke-width="10" fill="none" />
  <rect x="900" y="100" width="400" height="350" stroke="#d0d0c0" stroke-width="10" fill="none" />
  
  <!-- 窓の仕切り -->
  <line x1="600" y1="100" x2="600" y2="450" stroke="#d0d0c0" stroke-width="5" />
  <line x1="1100" y1="100" x2="1100" y2="450" stroke="#d0d0c0" stroke-width="5" />
  <line x1="400" y1="275" x2="800" y2="275" stroke="#d0d0c0" stroke-width="5" />
  <line x1="900" y1="275" x2="1300" y2="275" stroke="#d0d0c0" stroke-width="5" />
  
  <!-- メニューボード -->
  <rect x="350" y="550" width="500" height="200" fill="#333333" stroke="#222222" stroke-width="5" />
  <text x="400" y="600" font-family="Arial" font-size="40" fill="white">MENU</text>
  <rect x="400" y="620" width="400" height="2" fill="white" />
  <text x="400" y="660" font-family="Arial" font-size="24" fill="white">Coffee ................ ¥300</text>
  <text x="400" y="695" font-family="Arial" font-size="24" fill="white">Sandwich ............. ¥500</text>
  <text x="400" y="730" font-family="Arial" font-size="24" fill="white">Salad ................. ¥450</text>
  
  <!-- カウンター -->
  <rect x="1100" y="550" width="450" height="100" fill="#8a6343" stroke="#6a4a33" stroke-width="5" />
  <rect x="1100" y="650" width="450" height="130" fill="#6a4a33" />
  
  <!-- カウンターの上のカップや器具 -->
  <circle cx="1150" cy="580" r="20" fill="#ffffff" stroke="#dddddd" stroke-width="2" />
  <circle cx="1220" cy="580" r="20" fill="#ffffff" stroke="#dddddd" stroke-width="2" />
  <rect x="1300" y="560" width="60" height="80" fill="#cccccc" stroke="#aaaaaa" stroke-width="2" />
  <rect x="1400" y="570" width="100" height="50" fill="#333333" />
  
  <!-- 天井のライト -->
  <rect x="500" y="50" width="100" height="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
  <rect x="1000" y="50" width="100" height="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
  <rect x="1500" y="50" width="100" height="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
  
  <!-- 吊り下げランプ -->
  <line x1="550" y1="50" x2="550" y2="150" stroke="#d0d0c0" stroke-width="2" />
  <path d="M520,150 A30,30 0 0,0 580,150" fill="#fff9e6" stroke="#e0d0b0" stroke-width="2" />
  
  <line x1="1050" y1="50" x2="1050" y2="150" stroke="#d0d0c0" stroke-width="2" />
  <path d="M1020,150 A30,30 0 0,0 1080,150" fill="#fff9e6" stroke="#e0d0b0" stroke-width="2" />
  
  <line x1="1550" y1="50" x2="1550" y2="150" stroke="#d0d0c0" stroke-width="2" />
  <path d="M1520,150 A30,30 0 0,0 1580,150" fill="#fff9e6" stroke="#e0d0b0" stroke-width="2" />
  
  <!-- 壁の装飾 - プラント -->
  <rect x="150" y="500" width="80" height="100" fill="#6a4a33" />
  <path d="M130,500 C150,400 200,400 220,500" fill="#3d7a4d" stroke="#2d5a3d" stroke-width="2" />
  <path d="M140,500 C160,420 190,420 210,500" fill="#4d9a6d" stroke="#3d7a5d" stroke-width="2" />
  
  <rect x="1750" y="500" width="80" height="100" fill="#6a4a33" />
  <path d="M1730,500 C1750,400 1800,400 1820,500" fill="#3d7a4d" stroke="#2d5a3d" stroke-width="2" />
  <path d="M1740,500 C1760,420 1790,420 1810,500" fill="#4d9a6d" stroke="#3d7a5d" stroke-width="2" />
</svg>