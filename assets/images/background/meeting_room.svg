<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景色 -->
  <rect width="1920" height="1080" fill="#f5f5f0" />
  
  <!-- 床のパターン (高級感のあるカーペット) -->
  <pattern id="carpetPattern" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="#2a5b84" />
    <circle cx="20" cy="20" r="5" fill="#1a4570" />
  </pattern>
  <rect width="1920" height="300" y="780" fill="url(#carpetPattern)" />
  
  <!-- 壁のデザイン (木製パネル) -->
  <rect width="1920" height="780" fill="#8b4513" />
  <pattern id="woodPattern" width="200" height="200" patternUnits="userSpaceOnUse">
    <rect width="200" height="200" fill="#8b4513" />
    <rect x="0" y="0" width="200" height="10" fill="#6b3000" />
    <rect x="0" y="100" width="200" height="10" fill="#6b3000" />
  </pattern>
  <rect width="1920" height="780" fill="url(#woodPattern)" />
  <line x1="0" y1="780" x2="1920" y2="780" stroke="#5f3000" stroke-width="5" />
  
  <!-- 窓 (小さめ、高級感) -->
  <rect x="200" y="150" width="200" height="300" fill="#d9ebff" />
  <rect x="760" y="150" width="200" height="300" fill="#d9ebff" />
  <rect x="1320" y="150" width="200" height="300" fill="#d9ebff" />
  
  <!-- 窓枠 -->
  <rect x="200" y="150" width="200" height="300" stroke="#5f3000" stroke-width="15" fill="none" />
  <rect x="760" y="150" width="200" height="300" stroke="#5f3000" stroke-width="15" fill="none" />
  <rect x="1320" y="150" width="200" height="300" stroke="#5f3000" stroke-width="15" fill="none" />
  
  <!-- 窓の仕切り -->
  <line x1="300" y1="150" x2="300" y2="450" stroke="#5f3000" stroke-width="8" />
  <line x1="860" y1="150" x2="860" y2="450" stroke="#5f3000" stroke-width="8" />
  <line x1="1420" y1="150" x2="1420" y2="450" stroke="#5f3000" stroke-width="8" />
  
  <line x1="200" y1="300" x2="400" y2="300" stroke="#5f3000" stroke-width="8" />
  <line x1="760" y1="300" x2="960" y2="300" stroke="#5f3000" stroke-width="8" />
  <line x1="1320" y1="300" x2="1520" y2="300" stroke="#5f3000" stroke-width="8" />
  
  <!-- 装飾品 - 絵画 -->
  <rect x="500" y="200" width="160" height="120" fill="#d4af37" stroke="#5f3000" stroke-width="10" />
  <rect x="1060" y="200" width="160" height="120" fill="#d4af37" stroke="#5f3000" stroke-width="10" />
  <rect x="1620" y="200" width="160" height="120" fill="#d4af37" stroke="#5f3000" stroke-width="10" />
  
  <!-- 壁の装飾 - 壁飾り -->
  <rect x="50" y="550" width="1820" height="20" fill="#5f3000" />
  <rect x="50" y="580" width="1820" height="5" fill="#3f2000" />
  
  <!-- 天井のシャンデリア -->
  <circle cx="960" cy="150" r="80" fill="none" stroke="#d4af37" stroke-width="5" />
  <circle cx="960" cy="150" r="60" fill="none" stroke="#d4af37" stroke-width="3" />
  <circle cx="960" cy="150" r="40" fill="none" stroke="#d4af37" stroke-width="2" />
  
  <!-- シャンデリアの吊り下げ部分 -->
  <line x1="960" y1="70" x2="960" y2="150" stroke="#d4af37" stroke-width="3" />
  <line x1="900" y1="150" x2="1020" y2="150" stroke="#d4af37" stroke-width="3" />
  <line x1="928" y1="178" x2="992" y2="122" stroke="#d4af37" stroke-width="3" />
  <line x1="928" y1="122" x2="992" y2="178" stroke="#d4af37" stroke-width="3" />
  
  <!-- 光の効果 -->
  <circle cx="960" cy="150" r="20" fill="#ffffcc" opacity="0.5" />
</svg>