<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- 会議室背景（ボス戦用） -->
  <g id="meeting_room_background">
    <!-- 背景色 -->
    <rect width="800" height="600" fill="#f0f0f0"/>
    
    <!-- 床 -->
    <rect y="400" width="800" height="200" fill="#8B4513"/>
    <pattern id="woodPattern" patternUnits="userSpaceOnUse" width="60" height="60">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#7D3C0A" stroke-width="1"/>
      <line x1="0" y1="15" x2="60" y2="15" stroke="#7D3C0A" stroke-width="1"/>
      <line x1="0" y1="30" x2="60" y2="30" stroke="#7D3C0A" stroke-width="1"/>
      <line x1="0" y1="45" x2="60" y2="45" stroke="#7D3C0A" stroke-width="1"/>
    </pattern>
    <rect y="400" width="800" height="200" fill="url(#woodPattern)" fill-opacity="0.3"/>
    
    <!-- 壁 -->
    <rect y="50" width="800" height="350" fill="#e8e8e8"/>
    <line x1="0" y1="50" x2="800" y2="50" stroke="#d0d0d0" stroke-width="2"/>
    
    <!-- 大きな窓（景色付き） -->
    <rect x="50" y="80" width="700" height="200" fill="#87CEEB" stroke="#808080" stroke-width="3"/>
    <rect x="50" y="80" width="700" height="200" fill="url(#skyPattern)" stroke="#808080" stroke-width="3"/>
    
    <!-- 窓の景色パターン -->
    <pattern id="skyPattern" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="70" fill="#87CEEB"/>
      <rect y="70" width="100" height="30" fill="#228B22"/>
      <!-- 雲 -->
      <ellipse cx="20" cy="20" rx="15" ry="10" fill="#FFFFFF" fill-opacity="0.7"/>
      <ellipse cx="30" cy="25" rx="20" ry="8" fill="#FFFFFF" fill-opacity="0.7"/>
      <ellipse cx="70" cy="30" rx="25" ry="12" fill="#FFFFFF" fill-opacity="0.7"/>
      <ellipse cx="85" cy="35" rx="15" ry="10" fill="#FFFFFF" fill-opacity="0.7"/>
    </pattern>
    
    <!-- 窓枠 -->
    <line x1="190" y1="80" x2="190" y2="280" stroke="#808080" stroke-width="2"/>
    <line x1="330" y1="80" x2="330" y2="280" stroke="#808080" stroke-width="2"/>
    <line x1="470" y1="80" x2="470" y2="280" stroke="#808080" stroke-width="2"/>
    <line x1="610" y1="80" x2="610" y2="280" stroke="#808080" stroke-width="2"/>
    <line x1="50" y1="180" x2="750" y2="180" stroke="#808080" stroke-width="2"/>
    
    <!-- 会議テーブル -->
    <ellipse cx="400" cy="450" rx="300" ry="100" fill="#5D4037" stroke="#3E2723" stroke-width="3"/>
    <ellipse cx="400" cy="450" rx="280" ry="90" fill="#795548" stroke="#5D4037" stroke-width="2"/>
    
    <!-- 椅子 -->
    <rect x="150" y="350" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    <rect x="250" y="350" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    <rect x="350" y="350" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    <rect x="450" y="350" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    <rect x="550" y="350" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    
    <rect x="150" y="490" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    <rect x="250" y="490" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    <rect x="350" y="490" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    <rect x="450" y="490" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    <rect x="550" y="490" width="50" height="60" rx="5" ry="5" fill="#4E342E" stroke="#3E2723" stroke-width="1"/>
    
    <!-- 大きな重役椅子（ボス用） -->
    <rect x="400" y="300" width="80" height="100" rx="10" ry="10" fill="#000000" stroke="#333333" stroke-width="2"/>
    
    <!-- プロジェクタースクリーン -->
    <rect x="350" y="55" width="100" height="80" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="2"/>
    
    <!-- 天井 -->
    <rect y="0" width="800" height="50" fill="#d8d8d8"/>
    
    <!-- 照明 -->
    <rect x="150" y="10" width="100" height="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
    <rect x="350" y="10" width="100" height="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
    <rect x="550" y="10" width="100" height="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  </g>
</svg>