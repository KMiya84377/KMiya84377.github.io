<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景色 (暗い青) -->
  <rect width="1920" height="1080" fill="#0a192f" />
  
  <!-- 床のパターン (暗い床) -->
  <pattern id="floorPattern" width="100" height="100" patternUnits="userSpaceOnUse">
    <rect width="100" height="100" fill="#0c1021" />
    <rect width="50" height="50" fill="#0a0e1b" />
    <rect width="50" height="50" x="50" y="50" fill="#0a0e1b" />
  </pattern>
  <rect width="1920" height="300" y="780" fill="url(#floorPattern)" />
  
  <!-- 壁のデザイン -->
  <rect width="1920" height="780" fill="#0e1426" />
  <line x1="0" y1="780" x2="1920" y2="780" stroke="#070c1a" stroke-width="2" />
  
  <!-- 窓 (夜景) -->
  <rect x="100" y="100" width="300" height="400" fill="#050a14" />
  <rect x="450" y="100" width="300" height="400" fill="#050a14" />
  <rect x="800" y="100" width="300" height="400" fill="#050a14" />
  <rect x="1150" y="100" width="300" height="400" fill="#050a14" />
  <rect x="1500" y="100" width="300" height="400" fill="#050a14" />
  
  <!-- 窓枠 -->
  <rect x="100" y="100" width="300" height="400" stroke="#0d1424" stroke-width="10" fill="none" />
  <rect x="450" y="100" width="300" height="400" stroke="#0d1424" stroke-width="10" fill="none" />
  <rect x="800" y="100" width="300" height="400" stroke="#0d1424" stroke-width="10" fill="none" />
  <rect x="1150" y="100" width="300" height="400" stroke="#0d1424" stroke-width="10" fill="none" />
  <rect x="1500" y="100" width="300" height="400" stroke="#0d1424" stroke-width="10" fill="none" />
  
  <!-- 窓の仕切り -->
  <line x1="250" y1="100" x2="250" y2="500" stroke="#0d1424" stroke-width="5" />
  <line x1="600" y1="100" x2="600" y2="500" stroke="#0d1424" stroke-width="5" />
  <line x1="950" y1="100" x2="950" y2="500" stroke="#0d1424" stroke-width="5" />
  <line x1="1300" y1="100" x2="1300" y2="500" stroke="#0d1424" stroke-width="5" />
  <line x1="1650" y1="100" x2="1650" y2="500" stroke="#0d1424" stroke-width="5" />
  
  <line x1="100" y1="300" x2="400" y2="300" stroke="#0d1424" stroke-width="5" />
  <line x1="450" y1="300" x2="750" y2="300" stroke="#0d1424" stroke-width="5" />
  <line x1="800" y1="300" x2="1100" y2="300" stroke="#0d1424" stroke-width="5" />
  <line x1="1150" y1="300" x2="1450" y2="300" stroke="#0d1424" stroke-width="5" />
  <line x1="1500" y1="300" x2="1800" y2="300" stroke="#0d1424" stroke-width="5" />
  
  <!-- 窓の外の街明かり（遠くの建物の光） -->
  <rect x="120" y="320" width="5" height="10" fill="#ffcc88" opacity="0.7" />
  <rect x="140" y="350" width="5" height="8" fill="#ffcc88" opacity="0.7" />
  <rect x="180" y="330" width="4" height="15" fill="#ffcc88" opacity="0.7" />
  <rect x="210" y="360" width="6" height="12" fill="#ffcc88" opacity="0.7" />
  <rect x="260" y="340" width="5" height="10" fill="#ffcc88" opacity="0.7" />
  <rect x="330" y="370" width="5" height="8" fill="#ffcc88" opacity="0.7" />
  <rect x="270" y="420" width="7" height="7" fill="#ffcc88" opacity="0.7" />
  <rect x="170" y="450" width="5" height="10" fill="#ffcc88" opacity="0.7" />
  
  <rect x="470" y="320" width="5" height="10" fill="#ffcc88" opacity="0.7" />
  <rect x="520" y="380" width="6" height="9" fill="#ffcc88" opacity="0.7" />
  <rect x="580" y="420" width="4" height="12" fill="#ffcc88" opacity="0.7" />
  <rect x="640" y="350" width="5" height="10" fill="#ffcc88" opacity="0.7" />
  <rect x="690" y="390" width="7" height="8" fill="#ffcc88" opacity="0.7" />
  <rect x="730" y="430" width="5" height="15" fill="#ffcc88" opacity="0.7" />
  
  <rect x="820" y="370" width="5" height="10" fill="#ffcc88" opacity="0.7" />
  <rect x="870" y="410" width="8" height="9" fill="#ffcc88" opacity="0.7" />
  <rect x="930" y="350" width="5" height="11" fill="#ffcc88" opacity="0.7" />
  <rect x="980" y="420" width="6" height="8" fill="#ffcc88" opacity="0.7" />
  <rect x="1050" y="380" width="5" height="10" fill="#ffcc88" opacity="0.7" />
  
  <!-- 非常灯 -->
  <rect x="960" y="600" width="80" height="30" fill="#111111" stroke="#222222" stroke-width="2" rx="5" ry="5" />
  <rect x="965" y="605" width="70" height="20" fill="#881111" stroke="#aa2222" stroke-width="1" rx="3" ry="3" />
  <text x="975" y="621" font-family="Arial" font-size="14" fill="#ffffff">EXIT</text>
  
  <!-- 蛍光灯 (一部故障) -->
  <rect x="200" y="50" width="400" height="15" fill="#0a1020" stroke="#0d1424" stroke-width="2" />
  <rect x="205" y="53" width="390" height="9" fill="#aaccff" opacity="0.1" />
  
  <rect x="700" y="50" width="400" height="15" fill="#0a1020" stroke="#0d1424" stroke-width="2" />
  <rect x="705" y="53" width="390" height="9" fill="#aaccff" opacity="0.4" />
  
  <rect x="1200" y="50" width="400" height="15" fill="#0a1020" stroke="#0d1424" stroke-width="2" />
  <rect x="1205" y="53" width="390" height="9" fill="#aaccff" opacity="0.2" />
  
  <!-- 点滅する蛍光灯のエフェクト (SVGのアニメーション) -->
  <rect x="705" y="53" width="390" height="9" fill="#aaccff" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.8;0.3;0.7;0.4" dur="4s" repeatCount="indefinite" />
  </rect>
  
  <!-- 暗闇からわずかに見える家具のシルエット -->
  <rect x="300" y="600" width="200" height="80" fill="#050914" stroke="#0a1020" stroke-width="1" />
  <rect x="1400" y="600" width="200" height="80" fill="#050914" stroke="#0a1020" stroke-width="1" />
  <rect x="800" y="650" width="300" height="40" fill="#050914" stroke="#0a1020" stroke-width="1" />
  
  <!-- 影のエフェクト -->
  <ellipse cx="960" cy="800" rx="400" ry="30" fill="#000000" opacity="0.4" />
</svg>