<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景色 -->
  <rect width="1920" height="1080" fill="#f0f0f5" />
  
  <!-- 床のパターン -->
  <pattern id="floorPattern" width="100" height="100" patternUnits="userSpaceOnUse">
    <rect width="100" height="100" fill="#e6e6e6" />
    <rect width="50" height="50" fill="#d9d9d9" />
    <rect width="50" height="50" x="50" y="50" fill="#d9d9d9" />
  </pattern>
  <rect width="1920" height="300" y="780" fill="url(#floorPattern)" />
  
  <!-- 壁のデザイン -->
  <rect width="1920" height="780" fill="#ffffff" />
  <line x1="0" y1="780" x2="1920" y2="780" stroke="#cccccc" stroke-width="2" />
  
  <!-- 窓 -->
  <rect x="100" y="100" width="300" height="400" fill="#b3d9ff" />
  <rect x="450" y="100" width="300" height="400" fill="#b3d9ff" />
  <rect x="800" y="100" width="300" height="400" fill="#b3d9ff" />
  <rect x="1150" y="100" width="300" height="400" fill="#b3d9ff" />
  <rect x="1500" y="100" width="300" height="400" fill="#b3d9ff" />
  
  <!-- 窓枠 -->
  <rect x="100" y="100" width="300" height="400" stroke="#808080" stroke-width="10" fill="none" />
  <rect x="450" y="100" width="300" height="400" stroke="#808080" stroke-width="10" fill="none" />
  <rect x="800" y="100" width="300" height="400" stroke="#808080" stroke-width="10" fill="none" />
  <rect x="1150" y="100" width="300" height="400" stroke="#808080" stroke-width="10" fill="none" />
  <rect x="1500" y="100" width="300" height="400" stroke="#808080" stroke-width="10" fill="none" />
  
  <!-- 窓の仕切り -->
  <line x1="250" y1="100" x2="250" y2="500" stroke="#808080" stroke-width="5" />
  <line x1="600" y1="100" x2="600" y2="500" stroke="#808080" stroke-width="5" />
  <line x1="950" y1="100" x2="950" y2="500" stroke="#808080" stroke-width="5" />
  <line x1="1300" y1="100" x2="1300" y2="500" stroke="#808080" stroke-width="5" />
  <line x1="1650" y1="100" x2="1650" y2="500" stroke="#808080" stroke-width="5" />
  
  <line x1="100" y1="300" x2="400" y2="300" stroke="#808080" stroke-width="5" />
  <line x1="450" y1="300" x2="750" y2="300" stroke="#808080" stroke-width="5" />
  <line x1="800" y1="300" x2="1100" y1="300" stroke="#808080" stroke-width="5" />
  <line x1="1150" y1="300" x2="1450" y1="300" stroke="#808080" stroke-width="5" />
  <line x1="1500" y1="300" x2="1800" y1="300" stroke="#808080" stroke-width="5" />
  
  <!-- オフィスの雰囲気を出す装飾 -->
  <rect x="50" y="600" width="200" height="10" fill="#a0a0a0" /> <!-- 壁の装飾 -->
  <rect x="1670" y="600" width="200" height="10" fill="#a0a0a0" /> <!-- 壁の装飾 -->
  
  <!-- 天井のライト -->
  <rect x="200" y="50" width="100" height="30" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="2" />
  <rect x="800" y="50" width="100" height="30" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="2" />
  <rect x="1400" y="50" width="100" height="30" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="2" />
</svg>