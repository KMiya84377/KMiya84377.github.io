<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- オフィスのような背景 -->
  <rect x="0" y="0" width="800" height="600" fill="#f0f0f0"/>
  
  <!-- 床 -->
  <rect x="0" y="450" width="800" height="150" fill="#d0d0d0"/>
  <pattern id="floor" width="50" height="50" patternUnits="userSpaceOnUse">
    <rect width="50" height="50" fill="#d0d0d0"/>
    <line x1="0" y1="0" x2="50" y2="50" stroke="#c0c0c0" stroke-width="1"/>
    <line x1="50" y1="0" x2="0" y2="50" stroke="#c0c0c0" stroke-width="1"/>
  </pattern>
  <rect x="0" y="450" width="800" height="150" fill="url(#floor)"/>
  
  <!-- 壁 -->
  <rect x="50" y="100" width="200" height="350" fill="#e0e0e0" stroke="#c0c0c0" stroke-width="2"/>
  <rect x="350" y="100" width="200" height="350" fill="#e0e0e0" stroke="#c0c0c0" stroke-width="2"/>
  <rect x="650" y="100" width="100" height="350" fill="#e0e0e0" stroke="#c0c0c0" stroke-width="2"/>
  
  <!-- ドア -->
  <rect x="100" y="200" width="80" height="150" fill="#8b4513" stroke="#654321" stroke-width="2"/>
  <circle cx="160" cy="275" r="5" fill="#ffd700"/>
  
  <!-- 窓 -->
  <rect x="400" y="150" width="100" height="100" fill="#add8e6" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="450" y1="150" x2="450" y2="250" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="400" y1="200" x2="500" y2="200" stroke="#c0c0c0" stroke-width="2"/>
  
  <!-- オフィス家具 -->
  <rect x="600" y="350" width="100" height="50" fill="#8b4513" stroke="#654321" stroke-width="2"/>
  <rect x="610" y="400" width="80" height="50" fill="#8b4513" stroke="#654321" stroke-width="2"/>
  
  <!-- 天井のライト -->
  <ellipse cx="150" cy="80" rx="40" ry="20" fill="#ffffe0" stroke="#ffd700" stroke-width="2"/>
  <ellipse cx="450" cy="80" rx="40" ry="20" fill="#ffffe0" stroke="#ffd700" stroke-width="2"/>
  <ellipse cx="700" cy="80" rx="40" ry="20" fill="#ffffe0" stroke="#ffd700" stroke-width="2"/>
</svg>