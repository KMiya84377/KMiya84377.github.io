<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景色 (高級感のある暗い木目) -->
  <rect width="1920" height="1080" fill="#221408" />
  
  <!-- 床のパターン (豪華な木目床) -->
  <pattern id="floorPattern" width="120" height="120" patternUnits="userSpaceOnUse">
    <rect width="120" height="120" fill="#3a2712" />
    <rect x="0" y="0" width="120" height="1" fill="#201409" />
    <rect x="0" y="40" width="120" height="1" fill="#201409" />
    <rect x="0" y="80" width="120" height="1" fill="#201409" />
    <rect x="0" y="0" width="1" height="120" fill="#201409" />
    <rect x="40" y="0" width="1" height="120" fill="#201409" />
    <rect x="80" y="0" width="1" height="120" fill="#201409" />
    <polygon points="0,0 40,0 0,40" fill="#4a3722" />
    <polygon points="40,0 80,0 40,40" fill="#4a3722" />
    <polygon points="80,0 120,0 80,40" fill="#4a3722" />
    <polygon points="0,40 40,40 0,80" fill="#4a3722" />
    <polygon points="40,40 80,40 40,80" fill="#4a3722" />
    <polygon points="80,40 120,40 80,80" fill="#4a3722" />
    <polygon points="0,80 40,80 0,120" fill="#4a3722" />
    <polygon points="40,80 80,80 40,120" fill="#4a3722" />
    <polygon points="80,80 120,80 80,120" fill="#4a3722" />
  </pattern>
  <rect width="1920" height="300" y="780" fill="url(#floorPattern)" />
  
  <!-- 壁のデザイン (高級木製パネル) -->
  <pattern id="wallPattern" width="200" height="200" patternUnits="userSpaceOnUse">
    <rect width="200" height="200" fill="#3a2409" />
    <rect x="0" y="0" width="200" height="10" fill="#2a1806" />
    <rect x="0" y="100" width="200" height="10" fill="#2a1806" />
    <rect x="0" y="0" width="10" height="200" fill="#2a1806" />
    <rect x="100" y="0" width="10" height="200" fill="#2a1806" />
    <rect x="10" y="10" width="90" height="90" fill="#452b0f" stroke="#2a1806" stroke-width="1" />
    <rect x="110" y="10" width="90" height="90" fill="#452b0f" stroke="#2a1806" stroke-width="1" />
    <rect x="10" y="110" width="90" height="90" fill="#452b0f" stroke="#2a1806" stroke-width="1" />
    <rect x="110" y="110" width="90" height="90" fill="#452b0f" stroke="#2a1806" stroke-width="1" />
  </pattern>
  <rect width="1920" height="780" fill="url(#wallPattern)" />
  
  <!-- 床と壁の境界線 -->
  <line x1="0" y1="780" x2="1920" y2="780" stroke="#201409" stroke-width="5" />
  
  <!-- 大きな窓 (豪華な夜景) -->
  <rect x="1320" y="100" width="500" height="600" fill="#070c14" stroke="#5a3d20" stroke-width="15" />
  
  <!-- 窓の仕切り -->
  <line x1="1570" y1="100" x2="1570" y2="700" stroke="#5a3d20" stroke-width="8" />
  <line x1="1320" y1="350" x2="1820" y2="350" stroke="#5a3d20" stroke-width="8" />
  
  <!-- 窓の外の都会の夜景の光 -->
  <pattern id="citylightsPattern" width="20" height="20" patternUnits="userSpaceOnUse">
    <rect width="2" height="2" x="5" y="15" fill="#ffcc88" opacity="0.7" />
    <rect width="1" height="3" x="12" y="10" fill="#ffddaa" opacity="0.5" />
    <rect width="2" height="2" x="18" y="5" fill="#ffcc88" opacity="0.6" />
  </pattern>
  <rect x="1330" y="110" width="480" height="580" fill="url(#citylightsPattern)" />
  
  <!-- 豪華な机 -->
  <rect x="800" y="500" width="400" height="180" rx="10" ry="10" fill="#5a3d20" stroke="#3a2712" stroke-width="5" />
  <rect x="820" y="500" width="360" height="20" rx="5" ry="5" fill="#3a2712" />
  <rect x="820" y="660" width="360" height="20" rx="5" ry="5" fill="#3a2712" />
  <rect x="850" y="520" width="300" height="140" rx="5" ry="5" fill="#734d26" stroke="#6a4522" stroke-width="2" />
  
  <!-- 豪華な椅子 (後ろ向き) -->
  <rect x="950" y="680" width="100" height="20" fill="#1a1a1a" stroke="#000000" stroke-width="2" />
  <rect x="950" y="700" width="100" height="60" rx="10" ry="10" fill="#1a1a1a" stroke="#000000" stroke-width="2" />
  <rect x="960" y="680" width="80" height="100" rx="40" ry="40" fill="#1a1a1a" stroke="#000000" stroke-width="2" />
  <rect x="980" y="680" width="40" height="150" rx="5" ry="5" fill="#1a1a1a" stroke="#000000" stroke-width="2" />
  <rect x="980" y="760" width="40" height="70" rx="3" ry="3" fill="#0a0a0a" />
  
  <!-- 机の上の小物 -->
  <rect x="860" y="540" width="80" height="20" fill="#e0e0e0" stroke="#cccccc" stroke-width="1" /> <!-- 書類 -->
  <rect x="870" y="530" width="60" height="10" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1" /> <!-- 書類 -->
  <rect x="1060" y="550" width="40" height="60" rx="5" ry="5" fill="#884422" stroke="#663311" stroke-width="2" /> <!-- 木箱 -->
  <circle cx="970" cy="570" r="25" fill="#0a0a0a" stroke="#000000" stroke-width="2" /> <!-- 何かの装置 -->
  <line x1="970" y1="546" x2="970" y2="594" stroke="#333333" stroke-width="1" />
  <line x1="946" y1="570" x2="994" y2="570" stroke="#333333" stroke-width="1" />
  
  <!-- 壁掛け -->
  <rect x="150" y="150" width="300" height="400" fill="#000000" stroke="#5a3d20" stroke-width="20" />
  <rect x="180" y="180" width="240" height="340" fill="#110b04" />
  <path d="M300,300 C350,250 380,330 400,280" stroke="#c0a080" stroke-width="2" fill="none" />
  <path d="M200,350 C300,280 350,400 420,320" stroke="#c0a080" stroke-width="2" fill="none" />
  
  <!-- 豪華なシャンデリア -->
  <path d="M960,50 L960,150 M860,80 L1060,80" stroke="#c0a080" stroke-width="3" fill="none" />
  <circle cx="960" cy="150" r="100" fill="none" stroke="#c0a080" stroke-width="3" />
  <circle cx="960" cy="150" r="80" fill="none" stroke="#c0a080" stroke-width="2" />
  <circle cx="960" cy="150" r="60" fill="none" stroke="#c0a080" stroke-width="2" />
  <circle cx="960" cy="150" r="40" fill="none" stroke="#c0a080" stroke-width="1" />
  
  <!-- シャンデリアの装飾 -->
  <line x1="960" y1="50" x2="900" y2="150" stroke="#c0a080" stroke-width="1" />
  <line x1="960" y1="50" x2="860" y2="120" stroke="#c0a080" stroke-width="1" />
  <line x1="960" y1="50" x2="1020" y2="150" stroke="#c0a080" stroke-width="1" />
  <line x1="960" y1="50" x2="1060" y2="120" stroke="#c0a080" stroke-width="1" />
  
  <circle cx="900" cy="150" r="5" fill="#ffcc88" opacity="0.8" />
  <circle cx="860" cy="120" r="5" fill="#ffcc88" opacity="0.8" />
  <circle cx="1020" cy="150" r="5" fill="#ffcc88" opacity="0.8" />
  <circle cx="1060" cy="120" r="5" fill="#ffcc88" opacity="0.8" />
  <circle cx="960" cy="150" r="8" fill="#ffcc88" opacity="0.8" />
  
  <!-- シャンデリアの光 -->
  <circle cx="960" cy="150" r="120" fill="#ffcc88" opacity="0.1" />
  <circle cx="960" cy="150" r="80" fill="#ffcc88" opacity="0.1" />
  
  <!-- 壁際の豪華な装飾テーブル -->
  <rect x="600" y="300" width="200" height="40" fill="#5a3d20" stroke="#3a2712" stroke-width="3" rx="5" ry="5" />
  <rect x="610" y="340" width="180" height="10" fill="#3a2712" stroke="#201409" stroke-width="1" />
  <rect x="630" y="350" width="140" height="100" fill="#5a3d20" stroke="#3a2712" stroke-width="2" />
  
  <!-- テーブルの上の装飾品 -->
  <rect x="650" y="280" width="40" height="20" fill="#c0a080" stroke="#a08060" stroke-width="1" /> <!-- 装飾品 -->
  <circle cx="700" cy="290" r="10" fill="#a0a0a0" stroke="#808080" stroke-width="1" /> <!-- 置物 -->
  <circle cx="750" cy="290" r="15" fill="#558855" stroke="#336633" stroke-width="1" /> <!-- 観葉植物 -->
  <path d="M750,275 C760,265 740,260 730,270" stroke="#336633" stroke-width="1" fill="none" />
  
  <!-- 右側の豪華な本棚 -->
  <rect x="100" y="600" width="300" height="180" fill="#5a3d20" stroke="#3a2712" stroke-width="3" />
  <line x1="200" y1="600" x2="200" y2="780" stroke="#3a2712" stroke-width="2" />
  <line x1="300" y1="600" x2="300" y2="780" stroke="#3a2712" stroke-width="2" />
  <line x1="100" y1="650" x2="400" y2="650" stroke="#3a2712" stroke-width="2" />
  <line x1="100" y1="700" x2="400" y2="700" stroke="#3a2712" stroke-width="2" />
  <line x1="100" y1="750" x2="400" y2="750" stroke="#3a2712" stroke-width="2" />
  
  <!-- 本棚の本 -->
  <rect x="110" y="610" width="80" height="30" fill="#884422" />
  <rect x="210" y="610" width="60" height="30" fill="#442244" />
  <rect x="310" y="610" width="70" height="30" fill="#224422" />
  <rect x="120" y="660" width="70" height="30" fill="#224488" />
  <rect x="210" y="660" width="80" height="30" fill="#884422" />
  <rect x="320" y="660" width="50" height="30" fill="#442244" />
  <rect x="110" y="710" width="60" height="30" fill="#224422" />
  <rect x="210" y="710" width="70" height="30" fill="#224488" />
  <rect x="320" y="710" width="60" height="30" fill="#884422" />
  
  <!-- 高級感を出す装飾 -->
  <rect x="550" y="600" width="200" height="150" fill="#090604" stroke="#201409" stroke-width="5" />
  <rect x="560" y="610" width="180" height="130" fill="#5a3d20" />
  <path d="M650,640 C700,620 670,680 720,660" stroke="#c0a080" stroke-width="3" fill="none" />
  <path d="M580,680 C620,650 680,690 720,660" stroke="#c0a080" stroke-width="3" fill="none" />
  
  <!-- ラグジュアリーな照明の効果 -->
  <ellipse cx="960" cy="500" rx="600" ry="300" fill="#5a3d20" opacity="0.05" />
</svg>